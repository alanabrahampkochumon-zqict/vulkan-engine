name: Unit Tests

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
            fail-fast: true

            # Set up a matrix to run the following 10 configurations:
            # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
            # 1. <Windows, Debug, latest MSVC compiler toolchain on the default runner image, default generator>
            # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
            # 4. <Linux, Debug, latest GCC compiler toolchain on the default runner image, default generator>
            # 5. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
            # 6. <Linux, Debug, latest Clang compiler toolchain on the default runner image, default generator>
            # 7. <macOS, Release, latest GCC compiler toolchain on the default runner image, default generator>
            # 8. <macOS, Debug, latest GCC compiler toolchain on the default runner image, default generator>
            # 9. <macOS, Release, latest Clang compiler toolchain on the default runner image, default generator>
            # 10. <macOS, Debug, latest Clang compiler toolchain on the default runner image, default generator>
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                build_type: [Debug, Release]
                c_compiler: [gcc, clang, cl]
                include:
                    - os: windows-latest
                      c_compiler: cl
                      cpp_compiler: cl
                    - os: ubuntu-latest
                      c_compiler: gcc
                      cpp_compiler: g++
                    - os: ubuntu-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                    - os: macos-latest
                      c_compiler: gcc
                      cpp_compiler: g++
                    - os: macos-latest
                      c_compiler: clang
                      cpp_compiler: clang++
                exclude:
                    - os: windows-latest
                      c_compiler: gcc
                    - os: windows-latest
                      c_compiler: clang
                    - os: ubuntu-latest
                      c_compiler: cl
                    - os: macos-latest
                      c_compiler: cl

        steps:
            - uses: actions/checkout@v5

            - name: Set reusable strings
              id: strings
              shell: bash
              run: |
                  echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

            - name: Enable MSVC Developer Command Prompt
              uses: TheMrMilchmann/setup-msvc-dev@v4
              with:
                  arch: x64
              if: matrix.os == 'windows-latest'

            - name: Configure CMake
              run: >
                  cmake -B ${{ steps.strings.outputs.build-output-dir }}
                  -G Ninja
                  -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
                  -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
                  -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
                  -D ENABLE_STRICT=ON
                  -S ${{ github.workspace }}

            - name: Build
              run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

            - name: Test
              working-directory: ${{ steps.strings.outputs.build-output-dir }}
              run: ctest --build-config ${{ matrix.build_type }} -j 4 --output-on-failure
